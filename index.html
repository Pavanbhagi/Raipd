<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Swiftly. | Pavanbhagi</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0071E3">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/neo.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <style>
        :root {
            --apple-bg: #F5F5F7;
            --apple-glass: rgba(255,255,255,0.75);
            --apple-border: rgba(0,0,0,0.08);
            --apple-text: #1D1D1F;
            --apple-blue: #0071E3;
            --apple-green: #34C759;
            --apple-orange: #FF9500;
            --apple-red: #FF3B30;
            --apple-purple: #AF52DE;
            --apple-dim: #86868b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            scroll-behavior: smooth;
        }

        /* ── Progress Bar ── */
        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(0,0,0,0.05); z-index: 2001; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--apple-blue), var(--apple-purple)); transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

        /* ── XP HUD ── */
        #xp-hud {
            position: fixed; top: 16px; right: 20px; z-index: 2000;
            background: var(--apple-glass); backdrop-filter: blur(30px);
            border: 1px solid var(--apple-border); border-radius: 50px;
            padding: 8px 18px; display: flex; align-items: center; gap: 12px;
            font-size: 0.85rem; font-weight: 700;
        }
        #xp-badge {
            background: linear-gradient(135deg, var(--apple-blue), var(--apple-purple));
            color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.78rem;
        }
        #xp-bar-wrap { width: 80px; height: 6px; background: rgba(0,0,0,0.08); border-radius: 10px; overflow: hidden; }
        #xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--apple-blue), var(--apple-purple)); border-radius: 10px; transition: width 0.5s ease; }

        /* ── XP Toast ── */
        #xp-toast {
            position: fixed; bottom: 30px; right: 30px; z-index: 3000;
            background: var(--apple-text); color: white;
            padding: 12px 22px; border-radius: 50px; font-weight: 700; font-size: 0.9rem;
            opacity: 0; transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            pointer-events: none;
        }
        #xp-toast.show { opacity: 1; transform: translateY(0); }

        /* ── Pulse Dot ── */
        .pulse-dot { height: 8px; width: 8px; background: var(--apple-green); border-radius: 50%; display: inline-block; margin-right: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(52,199,89,0.7)} 70%{box-shadow:0 0 0 10px rgba(52,199,89,0)} 100%{box-shadow:0 0 0 0 rgba(52,199,89,0)} }

        /* ── Dock ── */
        .dock-wrapper { position: fixed; left: 20px; top: 120px; bottom: 40px; width: 70px; z-index: 1000; }
        .dock-container {
            background: var(--apple-glass); backdrop-filter: blur(30px);
            border: 1px solid var(--apple-border); border-radius: 22px;
            padding: 10px; display: flex; flex-direction: column; gap: 12px;
            overflow-y: auto; max-height: 100%; scrollbar-width: none;
        }
        .dock-icon {
            width: 44px; height: 44px; min-height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; cursor: pointer; transition: 0.3s cubic-bezier(0.25,0.1,0.25,1);
            background: rgba(0,0,0,0.03); color: var(--apple-text); font-size: 0.8rem;
        }
        .dock-icon:hover { transform: scale(1.3) translateX(10px); background: var(--apple-blue); color: white; }
        .dock-icon.completed { border: 2px solid var(--apple-green); box-shadow: 0 4px 12px rgba(52,199,89,0.25); }

        /* ── Main ── */
        .main-content { margin-left: 110px; max-width: 840px; padding: 0 40px 120px; }

        /* ── Card ── */
        .apple-card {
            background: white; border: 1px solid var(--apple-border); border-radius: 30px;
            padding: 40px; margin-bottom: 80px; opacity: 0; transform: translateY(40px);
            position: relative;
        }
        .module-indicator {
            position: absolute; left: -90px; width: 80px; text-align: right;
            font-size: 0.7rem; font-weight: 800; color: var(--apple-dim);
            text-transform: uppercase; letter-spacing: 0.15em; top: 44px;
        }

        /* ── Editor ── */
        .editor-container { margin-top: 25px; border-radius: 20px; overflow: hidden; border: 1px solid var(--apple-border); }
        .CodeMirror { height: auto; font-family: "SF Mono", monospace; font-size: 14px; padding: 20px; }

        /* ── Toolbar ── */
        .toolbar {
            padding: 12px 20px; border-top: 1px solid var(--apple-border);
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        .apple-btn {
            background: var(--apple-text); color: white; border: none;
            padding: 10px 22px; border-radius: 50px; font-weight: 600; cursor: pointer;
            transition: 0.3s ease; font-size: 0.85rem;
        }
        .apple-btn:hover { transform: scale(1.05); opacity: 0.9; }
        .apple-btn.secondary {
            background: rgba(0,0,0,0.05); color: var(--apple-text);
        }
        .apple-btn.secondary:hover { background: rgba(0,0,0,0.1); }
        .apple-btn.hint-btn { background: var(--apple-orange); }
        .apple-btn.challenge-btn { background: var(--apple-purple); }
        .apple-btn.challenge-btn.active { background: var(--apple-red); }

        /* ── Terminal ── */
        .terminal {
            background: #111; color: #50fa7b; padding: 20px;
            border-radius: 0 0 20px 20px; font-family: "SF Mono", monospace;
            display: none; font-size: 0.88rem; white-space: pre-wrap; line-height: 1.6;
        }
        .terminal.error { color: #ff6b6b; }
        .terminal.hint { color: #f1fa8c; }

        /* ── Challenge Mode Overlay ── */
        .challenge-expected {
            background: rgba(175,82,222,0.06); border: 1px dashed rgba(175,82,222,0.3);
            border-radius: 12px; padding: 14px 18px; margin-top: 14px;
            font-size: 0.82rem; font-family: "SF Mono", monospace;
            color: var(--apple-purple); display: none;
        }
        .challenge-expected strong { display: block; margin-bottom: 6px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.7; }

        /* ── Challenge locked ── */
        .locked-overlay {
            position: absolute; inset: 0; border-radius: 30px;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(2px);
            z-index: 10; display: none; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.1rem; color: var(--apple-purple); gap: 8px;
        }

        /* ── Hint Box ── */
        .hint-box {
            background: #1a1a2e; color: #f1fa8c;
            padding: 18px 20px; margin: 0; font-family: "SF Mono", monospace;
            font-size: 0.85rem; line-height: 1.7; white-space: pre-wrap;
            display: none; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .hint-box.visible { display: block; }
        .hint-loading { animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ── Challenge Result Banner ── */
        .challenge-result {
            padding: 12px 20px; font-weight: 700; font-size: 0.88rem;
            display: none; border-top: 1px solid var(--apple-border);
        }
        .challenge-result.pass { background: rgba(52,199,89,0.1); color: var(--apple-green); }
        .challenge-result.fail { background: rgba(255,59,48,0.08); color: var(--apple-red); }

        /* ── Level Badge ── */
        #level-label { font-size: 0.75rem; color: var(--apple-dim); }
    </style>
</head>
<body>

<div id="progress-container"><div id="progress-bar"></div></div>

<!-- XP HUD -->
<div id="xp-hud">
    <span id="xp-badge">Lv 1</span>
    <div>
        <div id="level-label">0 / 100 XP</div>
        <div id="xp-bar-wrap"><div id="xp-bar-fill" style="width:0%"></div></div>
    </div>
</div>

<!-- XP Toast -->
<div id="xp-toast"></div>

<div class="dock-wrapper">
    <nav class="dock-container" id="side-dock"></nav>
</div>

<main class="main-content">
    <header style="padding: 120px 0 80px;">
        <h1 style="font-size: 4.5rem; margin: 0; letter-spacing: -4px; font-weight: 800;">Code Swiftly.</h1>
        <div style="display:flex; align-items:center; margin-top:10px;">
            <span id="pulse-indicator" style="display:none;" class="pulse-dot"></span>
            <p id="engine-status" style="color:var(--apple-dim); font-size:1.1rem; margin:0;">Initializing Engine...</p>
        </div>
    </header>
    <div id="master-flow"></div>
</main>

<script>
// ═══════════════════════════════════════════
// XP SYSTEM
// ═══════════════════════════════════════════
const XP_PER_RUN = 10;
const XP_BONUS_CLEAN = 15; // no error first run
const XP_BONUS_CHALLENGE = 30;

const LEVELS = [
    { level: 1, label: "Newbie",     xp: 0   },
    { level: 2, label: "Coder",      xp: 100 },
    { level: 3, label: "Builder",    xp: 250 },
    { level: 4, label: "Hacker",     xp: 500 },
    { level: 5, label: "Architect",  xp: 800 },
    { level: 6, label: "Swift Pro",  xp: 1200},
];

let totalXP = 0;
const firstRunDone = new Set(); // track if module ran clean first time

function addXP(amount, label) {
    totalXP += amount;
    updateXPUI();
    showToast(`+${amount} XP — ${label}`);
}

function updateXPUI() {
    let current = LEVELS[0], next = null;
    for (let i = LEVELS.length - 1; i >= 0; i--) {
        if (totalXP >= LEVELS[i].xp) { current = LEVELS[i]; next = LEVELS[i+1]; break; }
    }
    const xpInLevel = totalXP - current.xp;
    const xpToNext = next ? next.xp - current.xp : 999;
    const pct = Math.min((xpInLevel / xpToNext) * 100, 100);
    document.getElementById('xp-badge').textContent = `Lv ${current.level} · ${current.label}`;
    document.getElementById('level-label').textContent = `${xpInLevel} / ${xpToNext} XP`;
    document.getElementById('xp-bar-fill').style.width = pct + '%';
}

let toastTimer;
function showToast(msg) {
    const t = document.getElementById('xp-toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
// MODULES DATA
// ═══════════════════════════════════════════
const pythonModules = [
    { id:1,  name:"Introduction",       code:"print('Welcome to Code Swiftly.')\nprint('Python is running natively in your browser.')",         expected:"Welcome to Code Swiftly.\nPython is running natively in your browser." },
    { id:2,  name:"Variable Logic",     code:"name = 'Swift'\nversion = 3.0\nprint(f'{name} v{version} active.')",                             expected:"Swift v3.0 active." },
    { id:3,  name:"List Architectures", code:"stack = ['Wasm', 'GSAP', 'CodeMirror']\nstack.append('PWA')\nprint(f'Project Stack: {stack}')",   expected:"Project Stack: ['Wasm', 'GSAP', 'CodeMirror', 'PWA']" },
    { id:4,  name:"Dictionary Mapping", code:"metadata = {'day': 4, 'status': 'Stable'}\nprint(f'System Status: {metadata}')",                  expected:"System Status: {'day': 4, 'status': 'Stable'}" },
    { id:5,  name:"Control Flow",       code:"try:\n    print(10/0)\nexcept ZeroDivisionError:\n    print('Error caught locally.')",             expected:"Error caught locally." },
    { id:6,  name:"File Streams",       code:"print('Simulating Virtual File Access...')\nprint('Buffer secured.')",                             expected:"Simulating Virtual File Access...\nBuffer secured." },
    { id:7,  name:"Object Blueprints",  code:"class IDE:\n    def __init__(self): self.type = 'Serverless'\nprint(IDE().type)",                  expected:"Serverless" },
    { id:8,  name:"Math Engine",        code:"import math\nprint(f'PI Calculation: {math.pi}')",                                                 expected:"PI Calculation: 3.141592653589793" },
    { id:9,  name:"Functions",          code:"def run(): return 'Success'\nprint(run())",                                                         expected:"Success" },
    { id:10, name:"List Comprehension", code:"print([x*x for x in range(5)])",                                                                    expected:"[0, 1, 4, 9, 16]" },
    { id:11, name:"Iterators",          code:"def g():\n    yield 'Step 1'\n    yield 'Step 2'\nprint(next(g()))",                               expected:"Step 1" },
    { id:12, name:"Decorators",         code:"def wrap(f): return lambda: f'[{f()}]'\n@wrap\ndef app(): return 'Swift'\nprint(app())",            expected:"[Swift]" },
    { id:13, name:"Closure Scopes",     code:"def outer(n): return lambda: n + 1\nprint(outer(26)())",                                           expected:"27" },
    { id:14, name:"JSON Parsing",       code:"import json\nprint(json.dumps({'engine': 'Wasm'}))",                                               expected:'{"engine": "Wasm"}' },
    { id:15, name:"Lambda Functions",   code:"f = lambda x: x**2\nprint(f(8))",                                                                   expected:"64" },
    { id:16, name:"Filter Logic",       code:"nums = [1, 2, 3, 4, 5]\nprint(list(filter(lambda x: x > 3, nums)))",                              expected:"[4, 5]" },
    { id:17, name:"Regex Patterns",     code:"import re\nprint(re.search('Swift', 'Code Swiftly').group())",                                     expected:"Swift" },
    { id:18, name:"Datetime API",       code:"from datetime import datetime\nprint(datetime.now())",                                              expected:"(current datetime)" },
    { id:19, name:"Web Simulation",     code:"print('Extraction live...')\nprint('Status: 200 OK')",                                             expected:"Extraction live...\nStatus: 200 OK" },
    { id:20, name:"System Version",     code:"import sys\nprint(sys.version)",                                                                    expected:"(python version string)" },
    { id:21, name:"Net Simulation",     code:"print('GET Request Ready.')",                                                                       expected:"GET Request Ready." },
    { id:22, name:"Auth Tokens",        code:"print('Bearer Token active.')",                                                                     expected:"Bearer Token active." },
    { id:23, name:"POST Protocols",     code:"print('Data Transmitted.')",                                                                        expected:"Data Transmitted." },
    { id:24, name:"Error Resilience",   code:"print('Recovery logic ready.')",                                                                    expected:"Recovery logic ready." },
    { id:25, name:"Asyncio",            code:"import asyncio\nasync def fetch():\n    print('Async task started...')\n    await asyncio.sleep(0.5)\n    print('Finished.')\nawait fetch()", expected:"Async task started...\nFinished." },
    { id:26, name:"Performance",        code:"import time\nstart = time.time()\n_ = [x for x in range(10000)]\nprint(f'Execution Time: {time.time()-start:.6f}s')", expected:"(timing output)" },
    { id:27, name:"Agentic Reasoning",  code:"def agent_think(task):\n    print(f'Thought: How to solve {task}?')\n    return 'Action: Query local database'\n\nprint(agent_think('Optimize Python Code'))", expected:"Thought: How to solve Optimize Python Code?\nAction: Query local database" },
    { id:28, name:"Vector Scoring (RAG)", code:"def similarity(a, b):\n    matches = set(a.split()) & set(b.split())\n    return len(matches) / max(len(a.split()), 1)\n\nprint(f'Match Score: {similarity(\"AI Python\", \"Python for AI\")}')", expected:"Match Score: 0.5" },
    { id:29, name:"Prompt Templates",   code:"def create_prompt(inp):\n    return f'### INSTRUCTION ###\\nSolve: {inp}\\n### OUTPUT ###'\n\nprint(create_prompt('Reverse string \"Swift\"'))", expected:'### INSTRUCTION ###\nSolve: Reverse string "Swift"\n### OUTPUT ###' },
    { id:30, name:"AI Safety Guardrails", code:"blocked = ['os.system', 'eval', 'subprocess']\ndef check(code):\n    return 'Safe' if not any(b in code for b in blocked) else 'Malicious'\n\nprint(f'Status: {check(\"print(1+1)\")}')", expected:"Status: Safe" },
];

// ═══════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════
let pyodide;
const editors = {};
const completedModules = new Set();
const challengeActive = new Set(); // modules in challenge mode
const lastErrors = {}; // store last error per module

async function start() {
    try {
        pyodide = await loadPyodide();
        document.getElementById('engine-status').innerText = "Python 3.11 Engine (Wasm) Live";
        document.getElementById('pulse-indicator').style.display = "inline-block";
        build();
        gsap.to(".apple-card", { opacity:1, y:0, duration:1.2, stagger:0.08, ease:"power4.out" });
    } catch(e) {
        document.getElementById('engine-status').innerText = "Engine Load Failed.";
    }
}

// ═══════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════
function build() {
    const dock = document.getElementById('side-dock');
    const flow = document.getElementById('master-flow');

    pythonModules.forEach(m => {
        // Dock icon
        const icon = document.createElement('div');
        icon.className = 'dock-icon';
        icon.id = `icon-${m.id}`;
        icon.innerText = m.id;
        icon.onclick = () => document.getElementById(`day-${m.id}`).scrollIntoView({ behavior:'smooth', block:'center' });
        dock.appendChild(icon);

        // Card
        const card = document.createElement('div');
        card.className = 'apple-card';
        card.id = `day-${m.id}`;

        card.innerHTML = `
            <div class="module-indicator">Day ${m.id}</div>
            <h2 style="margin:0 0 6px; font-weight:700;">${m.name}</h2>
            <p style="margin:0; font-size:0.82rem; color:var(--apple-dim);">Edit & run the code below.</p>

            <div class="challenge-expected" id="expected-${m.id}">
                <strong>🎯 Challenge — Match this output exactly:</strong>
                <span id="expected-text-${m.id}"></span>
            </div>

            <div class="editor-container" style="position:relative;">
                <div class="locked-overlay" id="lock-${m.id}">🔒 Challenge Mode — Write it from scratch</div>
                <textarea id="edit-${m.id}">${m.code}</textarea>
                <div class="toolbar">
                    <button class="apple-btn" onclick="runCode(${m.id})">▶ Execute</button>
                    <button class="apple-btn hint-btn" onclick="getHint(${m.id})">💡 Hint</button>
                    <button class="apple-btn challenge-btn" id="chal-btn-${m.id}" onclick="toggleChallenge(${m.id})">🎯 Challenge</button>
                </div>
                <div class="hint-box" id="hint-${m.id}"></div>
                <div class="challenge-result" id="chal-result-${m.id}"></div>
                <div class="terminal" id="term-${m.id}"></div>
            </div>
        `;
        flow.appendChild(card);

        editors[m.id] = CodeMirror.fromTextArea(document.getElementById(`edit-${m.id}`), {
            mode:"python", theme:"neo", lineNumbers:false, autoCloseBrackets:true
        });
    });
}

// ═══════════════════════════════════════════
// RUN CODE
// ═══════════════════════════════════════════
async function runCode(id) {
    const term = document.getElementById(`term-${id}`);
    const chalResult = document.getElementById(`chal-result-${id}`);
    term.style.display = "block";
    term.className = "terminal";
    term.innerText = ">>> Running...";
    chalResult.style.display = "none";

    const isFirstRun = !completedModules.has(id);

    try {
        await pyodide.runPythonAsync(`import sys, io\nsys.stdout = io.StringIO()`);
        await pyodide.runPythonAsync(editors[id].getValue());
        const output = pyodide.runPython("sys.stdout.getvalue()").trim();

        term.innerText = output || "Execution complete. (no output)";
        lastErrors[id] = null;

        // XP
        if (isFirstRun) { addXP(XP_PER_RUN + XP_BONUS_CLEAN, "Clean first run!"); }
        else { addXP(XP_PER_RUN, "Module executed"); }

        completedModules.add(id);
        document.getElementById(`icon-${id}`).classList.add('completed');
        document.getElementById('progress-bar').style.width = (completedModules.size / 30 * 100) + "%";

        // Challenge check
        if (challengeActive.has(id)) {
            const m = pythonModules.find(x => x.id === id);
            const expected = m.expected;
            const fuzzy = ["(current datetime)", "(python version string)", "(timing output)"];
            const isMatch = fuzzy.includes(expected) ? output.length > 0 : output === expected.trim();

            chalResult.style.display = "block";
            if (isMatch) {
                chalResult.className = "challenge-result pass";
                chalResult.innerHTML = "✅ Challenge Passed! Output matches perfectly.";
                addXP(XP_BONUS_CHALLENGE, "Challenge conquered!");
                toggleChallenge(id, true); // exit challenge
            } else {
                chalResult.className = "challenge-result fail";
                chalResult.innerHTML = `❌ Not quite. Expected:<br><code style="font-size:0.82rem;">${expected}</code>`;
            }
        }

    } catch(e) {
        term.className = "terminal error";
        term.innerText = "Runtime Error:\n" + e.message;
        lastErrors[id] = e.message;
    }
}

// ═══════════════════════════════════════════
// CHALLENGE MODE
// ═══════════════════════════════════════════
function toggleChallenge(id, forceExit = false) {
    const btn = document.getElementById(`chal-btn-${id}`);
    const lock = document.getElementById(`lock-${id}`);
    const expectedBox = document.getElementById(`expected-${id}`);
    const expectedText = document.getElementById(`expected-text-${id}`);
    const m = pythonModules.find(x => x.id === id);

    if (challengeActive.has(id) || forceExit) {
        // EXIT challenge
        challengeActive.delete(id);
        btn.className = "apple-btn challenge-btn";
        btn.textContent = "🎯 Challenge";
        lock.style.display = "none";
        expectedBox.style.display = "none";
        editors[id].setOption("readOnly", false);
        editors[id].setValue(m.code); // restore original
    } else {
        // ENTER challenge
        challengeActive.add(id);
        btn.className = "apple-btn challenge-btn active";
        btn.textContent = "✕ Exit Challenge";
        editors[id].setValue("# Challenge Mode — Write the code to produce the expected output\n");
        editors[id].setOption("readOnly", false);
        lock.style.display = "none"; // not locking editor, just clearing it
        expectedBox.style.display = "block";
        expectedText.textContent = m.expected;
        // Hide hint
        const hintBox = document.getElementById(`hint-${id}`);
        hintBox.className = "hint-box";
        hintBox.textContent = "";
    }
}

// ═══════════════════════════════════════════
// AI HINT SYSTEM
// ═══════════════════════════════════════════
async function getHint(id) {
    const hintBox = document.getElementById(`hint-${id}`);
    hintBox.className = "hint-box visible hint-loading";
    hintBox.textContent = "💡 Thinking...";

    const m = pythonModules.find(x => x.id === id);
    const userCode = editors[id].getValue();
    const lastError = lastErrors[id] || null;
    const isChallenge = challengeActive.has(id);

    const prompt = isChallenge
        ? `You are a Python mentor. The student is in Challenge Mode.
Task: Write Python code that produces this exact output: "${m.expected}"
Module topic: "${m.name}"
Student's current attempt:
\`\`\`python
${userCode}
\`\`\`
${lastError ? `Last error: ${lastError}` : "No errors yet."}

Give ONE short, specific hint (2-3 sentences max). Do NOT give the answer or full code. Guide their thinking. Be direct and encouraging.`
        : `You are a Python mentor reviewing a student's code.
Module: "${m.name}"
Student's code:
\`\`\`python
${userCode}
\`\`\`
${lastError ? `Runtime error they got: ${lastError}` : "Code ran but student needs deeper understanding."}

Give ONE short insight or tip (2-3 sentences max). Point out what could be improved or explain why the code works. Be direct, no fluff.`;

    try {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1000,
                messages: [{ role: "user", content: prompt }]
            })
        });
        const data = await res.json();
        const hint = data.content?.find(b => b.type === "text")?.text || "No hint available.";
        hintBox.className = "hint-box visible";
        hintBox.textContent = "💡 " + hint;
    } catch(e) {
        hintBox.className = "hint-box visible";
        hintBox.textContent = "⚠ Hint unavailable. Check your connection.";
    }
}
